name: nightstand_aod_clock
description: Minimal always-on display clock for Android with dyslexia-friendly font
publish_to: "none"
version: 0.0.1+3

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  wakelock_plus: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/OpenDyslexicMNerdFont-Regular.otf
    - assets/icons/icon.png

  fonts:
    - family: OpenDyslexicNerd
      fonts:
        - asset: assets/fonts/OpenDyslexicMNerdFont-Regular.otf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21
