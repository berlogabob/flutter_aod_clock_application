name: Release APK → GitHub Releases

# Triggers on version tags pushed by `make release`
# Tag format: v1.0.1.5  (semver with dots, no + for URL safety)
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.1.5)"
        required: true

permissions:
  contents: write # Required to create GitHub Releases

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run analysis
        run: flutter analyze

      # ── Optional: APK signing ─────────────────────────────────────────────
      # Add these repository secrets to enable a signed release APK:
      #   KEYSTORE_BASE64  – base64-encoded .jks keystore
      #   KEY_ALIAS        – key alias
      #   KEY_PASSWORD     – key password
      #   STORE_PASSWORD   – store password
      #
      # Then uncomment:
      # - name: Decode keystore
      #   env:
      #     KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      #   run: echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.jks
      # ─────────────────────────────────────────────────────────────────────

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK with release tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ -z "$TAG" ]; then TAG="${{ github.event.inputs.tag }}"; fi
          # Remove 'v' prefix for filename
          APK_TAG="${TAG#v}"
          APK_NAME="nightstand-clock-${APK_TAG}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> "$GITHUB_ENV"

      - name: Create GitHub Release and attach APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          name: "Nightstand Clock ${{ github.ref_name || github.event.inputs.tag }}"
          generate_release_notes: true
          files: ${{ env.APK_NAME }}
          # Prevent failure if release already exists (for manual re-runs)
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
